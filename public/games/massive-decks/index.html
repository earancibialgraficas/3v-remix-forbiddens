<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Massive Decks</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:#07070a;color:#f8fafc;font-family:Inter,Arial,sans-serif}
    body{display:grid;place-items:center;padding:18px;overflow:hidden}
    .shell{width:min(680px,100%);border:1px solid #fb718566;background:linear-gradient(145deg,#111827,#06070d);border-radius:14px;padding:22px;text-align:center;box-shadow:0 0 36px #000}
    h1{margin:0 0 10px;color:#fb7185;font-size:24px;letter-spacing:.08em;text-transform:uppercase}
    p{margin:0 auto 16px;max-width:54ch;color:#cbd5e1;font-size:14px;line-height:1.45}
    .actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    a,button{min-height:38px;border-radius:8px;border:1px solid #22d3ee;background:#0e7490;color:#001018;padding:10px 14px;font:inherit;font-size:13px;font-weight:900;text-decoration:none;cursor:pointer}
    .ghost{border-color:#fb7185;background:#111827;color:#f8fafc}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#000;display:none}
    body.embedded .shell{display:none}
    body.embedded iframe{display:block}
  </style>
</head>
<body>
  <main class="shell">
    <h1>Massive Decks</h1>
    <p>Juego de cartas party multijugador. Esta version usa la instancia oficial del proyecto, porque Massive Decks necesita su propio backend para salas, mazos y sincronizacion.</p>
    <div class="actions">
      <button id="embed">Abrir aqui</button>
      <a href="https://md.rereadgames.com/" target="_blank" rel="noopener noreferrer">Abrir en pestaña</a>
      <a class="ghost" href="https://github.com/Lattyware/massivedecks" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>
  </main>
  <iframe id="game" title="Massive Decks" src="about:blank" allow="fullscreen; clipboard-read; clipboard-write"></iframe>
  <script>
    const url = 'https://md.rereadgames.com/';
    const frame = document.getElementById('game');
    document.getElementById('embed').onclick = () => {
      document.body.classList.add('embedded');
      frame.src = url;
    };
  </script>
</body>
</html>
