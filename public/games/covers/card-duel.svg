      <stop offset="0" stop-color="#17051f"/>
      <stop offset=".48" stop-color="#111827"/>
      <stop offset="1" stop-color="#2e1065"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#000" flood-opacity=".55"/>
