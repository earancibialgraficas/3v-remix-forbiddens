    <path d="M232 332l48 68M280 332l-48 68" stroke="#60a5fa" stroke-width="18" filter="url(#blueGlow)"/>
    <circle cx="366" cy="366" r="38" stroke="#fb7185" stroke-width="17" filter="url(#redGlow)"/>
  </g>
  <text x="256" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="900" letter-spacing="2" fill="#67e8f9">TIC TAC TOE</text>
  <text x="256" y="468" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="900" letter-spacing="2" fill="#facc15">NEON 2P</text>
