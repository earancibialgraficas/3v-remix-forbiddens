    <path d="M232 112l48 68M280 112l-48 68" stroke="#60a5fa" stroke-width="18" filter="url(#blueGlow)"/>
    <path d="M100 232l68 68M168 232l-68 68" stroke="#60a5fa" stroke-width="18" filter="url(#blueGlow)"/>
    <circle cx="256" cy="256" r="38" stroke="#fb7185" stroke-width="17" filter="url(#redGlow)"/>
