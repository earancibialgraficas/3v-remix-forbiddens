    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g opacity=".2">
    <path d="M0 92h512M0 184h512M0 276h512M0 368h512M92 0v512M184 0v512M276 0v512M368 0v512" stroke="#fb7185" stroke-width="3"/>
  </g>
  <circle cx="94" cy="102" r="76" fill="#22d3ee" opacity=".14"/>
  <circle cx="420" cy="398" r="108" fill="#facc15" opacity=".12"/>
  <g filter="url(#shadow)" transform="rotate(-12 204 264)">
    <rect x="108" y="130" width="150" height="226" rx="18" fill="#050505" stroke="#f8fafc" stroke-width="5"/>
    <text x="183" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#fb7185">PROMPT</text>
    <path d="M144 232h78M144 270h64M144 308h90" stroke="#f8fafc" stroke-width="11" stroke-linecap="round"/>
  </g>
