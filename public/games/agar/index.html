<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Forbiddens Agar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: none; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const params = new URLSearchParams(window.location.search);
        
        const room = params.get('room');
        const sbUrl = params.get('sbUrl');
        const sbKey = params.get('sbKey');
        const userId = params.get('userId') || `guest_${Math.random().toString(36).slice(2, 10)}`;
        const userName = params.get('displayName') || 'Invitado';
        const avatarUrl = params.get('avatarUrl');

        // Configuración de Supabase Realtime
        const supabaseClient = supabase.createClient(sbUrl, sbKey);
        const channel = supabaseClient.channel(`agar_${room}`, {
            config: { presence: { key: userId } }
        });

        // Estado del Juego
        let worldSize = 3000;
        let myPos = { x: Math.random() * worldSize, y: Math.random() * worldSize };
        let camera = { x: myPos.x, y: myPos.y };
        let myScore = 40;
        let cells = [{ id: 'main', x: myPos.x, y: myPos.y, score: myScore, vx: 0, vy: 0, rejoinAt: 0 }];
        let players = {};
        let food = [];
        let mouse = { x: 0, y: 0 };
        let nextAwardScore = myScore + 20;
        let awardInFlight = false;
        const avatarCache = {};

        function getLocalPlayer() {
            return { userId, name: userName, avatarUrl, score: myScore, x: myPos.x, y: myPos.y };
        }

        function syncLocalStats() {
            const total = cells.reduce((sum, cell) => sum + cell.score, 0) || 40;
            myScore = total;
            myPos = cells.reduce((center, cell) => {
                center.x += cell.x * cell.score / total;
                center.y += cell.y * cell.score / total;
                return center;
            }, { x: 0, y: 0 });
        }

        function resetLocalPlayer() {
            myPos = { x: Math.random() * worldSize, y: Math.random() * worldSize };
            camera = { x: myPos.x, y: myPos.y };
            myScore = 40;
            cells = [{ id: 'main', x: myPos.x, y: myPos.y, score: myScore, vx: 0, vy: 0, rejoinAt: 0 }];
            nextAwardScore = myScore + 20;
        }

        function directionFromPointer() {
            const centerX = canvasWidth() / 2;
            const centerY = canvasHeight() / 2;
            const dx = mouse.x - centerX;
            const dy = mouse.y - centerY;
            const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            return { x: dx / dist, y: dy / dist };
        }

        function splitCells() {
            if (cells.length >= 8) return;
            const dir = directionFromPointer();
            const now = Date.now();
            const nextCells = [];
            cells.forEach(cell => {
                if (cell.score < 70 || nextCells.length >= 8) {
                    nextCells.push(cell);
                    return;
                }
                const childScore = cell.score * 0.5;
                cell.score = childScore;
                cell.vx -= dir.x * 5;
                cell.vy -= dir.y * 5;
                cell.rejoinAt = now + 3200;
                nextCells.push(cell);
                if (nextCells.length < 8) {
                    nextCells.push({
                        id: Math.random().toString(36).slice(2, 9),
                        x: Math.max(0, Math.min(worldSize, cell.x + dir.x * (childScore + 20))),
                        y: Math.max(0, Math.min(worldSize, cell.y + dir.y * (childScore + 20))),
                        score: childScore,
                        vx: dir.x * 26,
                        vy: dir.y * 26,
                        rejoinAt: now + 3200
                    });
                }
            });
            cells = nextCells;
            syncLocalStats();
        }

        // Generar comida inicial
        for(let i=0; i<150; i++) {
            food.push({ 
                x: Math.random() * worldSize, 
                y: Math.random() * worldSize, 
                c: `hsl(${Math.random()*360}, 70%, 60%)` 
            });
        }

        function getImg(url) {
            if (!url) return null;
            if (avatarCache[url]) return avatarCache[url];
            const img = new Image();
            img.src = url;
            img.crossOrigin = "anonymous";
            avatarCache[url] = img;
            return img;
        }

        async function awardAgarProgress() {
            if (awardInFlight || myScore < nextAwardScore) return;
            awardInFlight = true;
            try {
                const points = Math.max(1, Math.min(10, Math.floor((myScore - nextAwardScore + 20) / 10)));
                const { data } = await supabaseClient.rpc('award_multiplayer_win', {
                    p_game_slug: 'agar',
                    p_room_code: room,
                    p_points: points
                });
                if (data?.awarded > 0) {
                    window.parent.postMessage({ type: 'game:pointsAwarded', awarded: data.awarded, total: data.leaderboard_score }, '*');
                }
            } catch (e) {
                console.warn('No se pudieron guardar puntos de Agar', e);
            } finally {
                while (myScore >= nextAwardScore) nextAwardScore += 20;
                awardInFlight = false;
            }
        }

        // Sincronización Multijugador
        channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const newPlayers = {};
                Object.keys(state).forEach(key => {
                    newPlayers[key] = state[key][0];
                });
                players = newPlayers;
                
                // 📡 ENVIAR LEADERBOARD AL MARCO DE FORBIDDENS
                const leaderboardPlayers = { ...players, [userId]: getLocalPlayer() };
                const leaderboard = Object.values(leaderboardPlayers)
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 10)
                    .map(p => ({
                        userId: p.userId,
                        name: p.name,
                        avatarUrl: p.avatarUrl,
                        score: Math.floor(p.score)
                    }));
                
                window.parent.postMessage({ type: 'game:updateLeaderboard', players: leaderboard }, '*');
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await channel.track(getLocalPlayer());
                }
            });

        // Loop de física
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const width = Math.max(1, Math.floor(rect.width || window.innerWidth));
            const height = Math.max(1, Math.floor(rect.height || window.innerHeight));
            const dpr = Math.max(1, window.devicePixelRatio || 1);
            const nextWidth = Math.floor(width * dpr);
            const nextHeight = Math.floor(height * dpr);
            if (canvas.width !== nextWidth || canvas.height !== nextHeight) {
                canvas.width = nextWidth;
                canvas.height = nextHeight;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            if (!mouse.x && !mouse.y) {
                mouse = { x: width / 2, y: height / 2 };
            }
        }

        function canvasWidth() {
            return canvas.clientWidth || window.innerWidth;
        }

        function canvasHeight() {
            return canvas.clientHeight || window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        setInterval(() => {
            const centerX = canvasWidth() / 2;
            const centerY = canvasHeight() / 2;
            const dx = mouse.x - centerX;
            const dy = mouse.y - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            const moveX = dist > 10 ? dx / dist : 0;
            const moveY = dist > 10 ? dy / dist : 0;
            const now = Date.now();

            cells.forEach(cell => {
                const speed = Math.max(1.05, 7 - (cell.score / 90));
                cell.vx = (cell.vx + moveX * speed) * 0.86;
                cell.vy = (cell.vy + moveY * speed) * 0.86;
                cell.x = Math.max(0, Math.min(worldSize, cell.x + cell.vx));
                cell.y = Math.max(0, Math.min(worldSize, cell.y + cell.vy));
            });

            for (let i = cells.length - 1; i >= 0; i--) {
                for (let j = i - 1; j >= 0; j--) {
                    const a = cells[i];
                    const b = cells[j];
                    const dxCells = a.x - b.x;
                    const dyCells = a.y - b.y;
                    const d = Math.max(1, Math.sqrt(dxCells * dxCells + dyCells * dyCells));
                    const minDistance = (a.score + b.score) * 0.62;
                    if (d < minDistance && (now < a.rejoinAt || now < b.rejoinAt)) {
                        const push = (minDistance - d) * 0.03;
                        a.vx += (dxCells / d) * push;
                        a.vy += (dyCells / d) * push;
                        b.vx -= (dxCells / d) * push;
                        b.vy -= (dyCells / d) * push;
                    } else if (d < Math.max(a.score, b.score) * 0.5 && now >= a.rejoinAt && now >= b.rejoinAt) {
                        b.score += a.score;
                        cells.splice(i, 1);
                        break;
                    }
                }
            }
            
            // Colisión con comida
            food = food.filter(f => {
                for (const cell of cells) {
                    const d = Math.sqrt((f.x - cell.x)**2 + (f.y - cell.y)**2);
                    if (d < cell.score) { cell.score += 0.5; return false; }
                }
                return true;
            });
            while(food.length < 150) food.push({ x: Math.random() * worldSize, y: Math.random() * worldSize, c: `hsl(${Math.random()*360}, 70%, 60%)` });

            // ⚔️ Colisión entre jugadores (Comer / Ser comido)
            Object.keys(players).forEach(id => {
                if (id === userId) return;
                const p = players[id];
                if (!p || p.userId === userId) return;
                cells = cells.filter(cell => {
                    const cellDistance = Math.sqrt((p.x - cell.x)**2 + (p.y - cell.y)**2);
                    if (cell.score > p.score * 1.1 && cellDistance < cell.score) {
                        cell.score += p.score * 0.08;
                        return true;
                    }
                    if (p.score > cell.score * 1.1 && cellDistance < p.score) {
                        return false;
                    }
                    return true;
                });
                if (!cells.length) resetLocalPlayer();
            });
            syncLocalStats();
            awardAgarProgress();

            // Actualizar mi posición a los demás
            channel.track(getLocalPlayer());
        }, 1000/60);

        function drawPlayer(p, camX, camY) {
            const x = p.x + camX;
            const y = p.y + camY;
            const r = p.score;

            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.clip();

            const img = getImg(p.avatarUrl);
            if (img && img.complete) {
                ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
            } else {
                ctx.fillStyle = p.userId === userId ? '#00f3ff' : '#222';
                ctx.fill();
            }
            ctx.restore();

            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.strokeStyle = p.userId === userId ? '#00f3ff' : '#ff00ff';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function draw() {
            resizeCanvas();
            const width = canvasWidth();
            const height = canvasHeight();
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0,0,width, height);

            camera.x += (myPos.x - camera.x) * 0.12;
            camera.y += (myPos.y - camera.y) * 0.12;

            const camX = width / 2 - camera.x;
            const camY = height / 2 - camera.y;

            // 🏁 Dibujar cuadrícula de fondo neón
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            const step = 100;
            for (let x = (camX % step); x < width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for (let y = (camY % step); y < height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }
            ctx.strokeStyle = '#222';
            ctx.strokeRect(camX, camY, worldSize, worldSize); // Bordes del mundo

            // Dibujar comida
            food.forEach(f => {
                ctx.fillStyle = f.c;
                ctx.beginPath();
                ctx.arc(f.x + camX, f.y + camY, 6, 0, Math.PI*2);
                ctx.fill();
            });

            // Dibujar jugadores remotos desde Realtime y al jugador local desde la fisica actual.
            Object.values(players).forEach(p => {
                if (!p || p.userId === userId) return;
                drawPlayer(p, camX, camY);
            });
            cells.forEach(cell => drawPlayer({ ...getLocalPlayer(), x: cell.x, y: cell.y, score: cell.score }, camX, camY));

            requestAnimationFrame(draw);
        }

        function updatePointer(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            mouse = {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        canvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            canvas.setPointerCapture?.(e.pointerId);
            updatePointer(e.clientX, e.clientY);
        });
        canvas.addEventListener('pointermove', e => {
            e.preventDefault();
            updatePointer(e.clientX, e.clientY);
        });
        canvas.addEventListener('mousemove', e => updatePointer(e.clientX, e.clientY));
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                splitCells();
            }
        });
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            if (touch) updatePointer(touch.clientX, touch.clientY);
        }, { passive: false });
        draw();
    </script>
</body>
</html>
