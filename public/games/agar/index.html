<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arena - Multiplayer (agar-like)</title>
  <style>body{margin:0;background:#010;overflow:hidden}canvas{display:block}</style>
</head>
<body>
  <canvas id="g"></canvas>
  <script>
    const ws = new WebSocket('ws://'+location.hostname+':12346');
    const c=document.getElementById('g'); const ctx=c.getContext('2d'); function resize(){c.width=innerWidth;c.height=innerHeight;} resize(); onresize=resize;
    const me = {x:100,y:100,r:20,color:'#ff6'}; const others = {};
    ws.onmessage = e=>{ const d=JSON.parse(e.data); if (d.type==='created'){ alert('Sala: '+d.room); } if (d.type==='relay' && d.originalType==='pos'){ const p=d.payload; others[p.id]=p; } };
    let id = Math.random().toString(36).slice(2,9);
    setInterval(()=>{ ws.send(JSON.stringify({ type:'pos', room:location.search.split('room=')[1] || '', payload:{ id, x:me.x, y:me.y, r:me.r }})); }, 100);
    addEventListener('mousemove', e=>{ me.x=e.clientX; me.y=e.clientY; });
    function loop(){ ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,c.width,c.height); ctx.fillStyle=me.color; ctx.beginPath(); ctx.arc(me.x,me.y,me.r,0,6.28); ctx.fill(); for(const k in others){ const p=others[k]; ctx.fillStyle='#6ef'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); } requestAnimationFrame(loop); }
    loop();
  </script>
</body>
</html>
