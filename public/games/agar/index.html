<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Forbiddens Agar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; width: 100dvw; height: 100dvh; cursor: crosshair; touch-action: none; }
        canvas.locked { cursor: none; }
        #split {
            position: fixed;
            right: max(14px, env(safe-area-inset-right));
            bottom: max(14px, env(safe-area-inset-bottom));
            z-index: 3;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 1px solid #67e8f9;
            background: #06111bcc;
            color: #e0f2fe;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 0 22px #22d3ee66;
            touch-action: manipulation;
        }
        @media (hover:hover) and (pointer:fine) { #split { display: none; } }
        @media (max-width:430px) { #split { width: 52px; height: 52px; font-size: 20px; } }
        #death {
            position: fixed;
            inset: 0;
            z-index: 8;
            display: none;
            align-items: center;
            justify-content: center;
            background: #020617cc;
            backdrop-filter: blur(8px);
            color: #f8fafc;
        }
        #death.show { display: flex; }
        .death-card {
            width: min(360px, calc(100vw - 32px));
            border: 1px solid #fb7185aa;
            border-radius: 14px;
            background: #09090fee;
            box-shadow: 0 0 36px #fb718555;
            padding: 20px;
            text-align: center;
        }
        .death-card h1 { margin: 0 0 10px; font-size: 18px; color: #fb7185; }
        .death-card p { margin: 6px 0; font-size: 13px; color: #cbd5e1; }
        .death-card strong { color: #86efac; }
        .death-card button {
            margin-top: 14px;
            min-height: 36px;
            border-radius: 10px;
            border: 1px solid #22d3ee;
            background: #083344;
            color: #e0f2fe;
            padding: 0 14px;
            font: 800 12px Inter, Arial, sans-serif;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button id="split" type="button" aria-label="Dividir">x2</button>
    <div id="death" role="dialog" aria-modal="true">
        <div class="death-card">
            <h1>Te comieron</h1>
            <p>Puntos de esta sesion: <strong id="deathPoints">0</strong></p>
            <p>Masa maxima: <strong id="deathMass">40</strong></p>
            <button type="button" id="resetPlayer">Resetear</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const splitButton = document.getElementById('split');
        const deathEl = document.getElementById('death');
        const deathPointsEl = document.getElementById('deathPoints');
        const deathMassEl = document.getElementById('deathMass');
        const resetPlayerButton = document.getElementById('resetPlayer');
        const ctx = canvas.getContext('2d');
        const params = new URLSearchParams(window.location.search);
        
        const room = params.get('room');
        const sbUrl = params.get('sbUrl');
        const sbKey = params.get('sbKey');
        const userId = params.get('userId') || `guest_${Math.random().toString(36).slice(2, 10)}`;
        const playerId = params.get('playerId') || `${userId}_${Math.random().toString(36).slice(2, 8)}`;
        const userName = params.get('displayName') || 'Invitado';
        const avatarUrl = params.get('avatarUrl');

        // Configuración de Supabase Realtime
        const supabaseClient = supabase.createClient(sbUrl, sbKey);
        const channel = supabaseClient.channel(`agar_${room}`, {
            config: { broadcast: { self: false }, presence: { key: playerId } }
        });

        // Estado del Juego
        let worldSize = 3000;
        function createSpawnPoint() {
            const spread = 420;
            return {
                x: worldSize / 2 + (Math.random() - 0.5) * spread,
                y: worldSize / 2 + (Math.random() - 0.5) * spread
            };
        }
        let myPos = createSpawnPoint();
        let camera = { x: myPos.x, y: myPos.y, zoom: 1 };
        let myScore = 40;
        let cells = [{ id: 'main', x: myPos.x, y: myPos.y, score: myScore, vx: 0, vy: 0, splitAt: 0, mergeAt: 0 }];
        let players = {};
        let hasAnchoredSpawn = false;
        let food = [];
        let mouse = { x: 0, y: 0 };
        let virtualAim = { x: 0, y: 0 };
        let lastBroadcastAt = 0;
        let lastPresenceTrackAt = 0;
        let lastLeaderboardAt = 0;
        let nextAwardScore = myScore + 20;
        let awardInFlight = false;
        let sessionAwarded = 0;
        let foodPointsPending = 0;
        let lastPublishedFoodPoints = 0;
        let bestMass = myScore;
        let gameOver = false;
        const REMOTE_PLAYER_TTL = 60000;
        const avatarCache = {};

        function getLocalPlayer() {
            return {
                userId,
                playerId,
                name: userName,
                avatarUrl,
                points: sessionAwarded + foodPointsPending,
                sessionPoints: sessionAwarded + foodPointsPending,
                score: gameOver ? 0 : myScore,
                x: myPos.x,
                y: myPos.y,
                lastSeen: Date.now(),
                cells: gameOver ? [] : cells.map(cell => ({
                    id: cell.id,
                    x: cell.x,
                    y: cell.y,
                    score: cell.score
                }))
            };
        }

        function syncLocalStats() {
            const total = cells.reduce((sum, cell) => sum + cell.score, 0) || 40;
            myScore = total;
            bestMass = Math.max(bestMass, myScore);
            myPos = cells.reduce((center, cell) => {
                center.x += cell.x * cell.score / total;
                center.y += cell.y * cell.score / total;
                return center;
            }, { x: 0, y: 0 });
        }

        function resetLocalPlayer() {
            myPos = createSpawnPoint();
            camera = { x: myPos.x, y: myPos.y, zoom: 1 };
            myScore = 40;
            cells = [{ id: 'main', x: myPos.x, y: myPos.y, score: myScore, vx: 0, vy: 0, splitAt: 0, mergeAt: 0 }];
            nextAwardScore = myScore + 20;
            gameOver = false;
            bestMass = myScore;
            deathEl.classList.remove('show');
            hasAnchoredSpawn = false;
            anchorSpawnNearRemote();
            canvas.focus?.();
        }

        function showDeath() {
            gameOver = true;
            cells = [];
            deathPointsEl.textContent = String(sessionAwarded + foodPointsPending);
            deathMassEl.textContent = String(Math.floor(bestMass));
            deathEl.classList.add('show');
            if (document.pointerLockElement === canvas) document.exitPointerLock?.();
        }

        function directionFromPointer() {
            const centerX = canvasWidth() / 2;
            const centerY = canvasHeight() / 2;
            const dx = mouse.x - centerX;
            const dy = mouse.y - centerY;
            const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            return { x: dx / dist, y: dy / dist };
        }

        function aimIntensity() {
            const centerX = canvasWidth() / 2;
            const centerY = canvasHeight() / 2;
            const dx = mouse.x - centerX;
            const dy = mouse.y - centerY;
            const maxDist = Math.max(90, Math.min(canvasWidth(), canvasHeight()) * 0.42);
            return Math.min(1, Math.sqrt(dx * dx + dy * dy) / maxDist);
        }

        function splitCells() {
            if (cells.length >= 8) return;
            const dir = directionFromPointer();
            const now = Date.now();
            const nextCells = [];
            cells.forEach(cell => {
                if (cell.score < 70 || nextCells.length >= 8) {
                    nextCells.push(cell);
                    return;
                }
                const childScore = cell.score * 0.5;
                cell.score = childScore;
                cell.vx -= dir.x * 1.5;
                cell.vy -= dir.y * 1.5;
                cell.splitAt = now;
                cell.mergeAt = now + 30000;
                nextCells.push(cell);
                if (nextCells.length < 8) {
                    nextCells.push({
                        id: Math.random().toString(36).slice(2, 9),
                        x: Math.max(0, Math.min(worldSize, cell.x + dir.x * (childScore + 20))),
                        y: Math.max(0, Math.min(worldSize, cell.y + dir.y * (childScore + 20))),
                        score: childScore,
                        vx: dir.x * 11,
                        vy: dir.y * 11,
                        splitAt: now,
                        mergeAt: now + 30000
                    });
                }
            });
            cells = nextCells;
            syncLocalStats();
        }

        function mergeCells(now) {
            if (cells.length <= 1) return;
            const ready = cells.every(cell => now >= (cell.mergeAt || 0));
            if (!ready) return;
            const total = cells.reduce((sum, cell) => sum + cell.score, 0);
            const center = cells.reduce((acc, cell) => {
                acc.x += cell.x * cell.score / total;
                acc.y += cell.y * cell.score / total;
                acc.vx += cell.vx * cell.score / total;
                acc.vy += cell.vy * cell.score / total;
                return acc;
            }, { x: 0, y: 0, vx: 0, vy: 0 });

            cells.forEach(cell => {
                cell.vx += (center.x - cell.x) * 0.0028;
                cell.vy += (center.y - cell.y) * 0.0028;
            });

            const closeEnough = cells.every(cell => Math.hypot(cell.x - center.x, cell.y - center.y) < Math.max(16, Math.sqrt(total) * 0.9));
            if (closeEnough) {
                cells = [{
                    id: 'main',
                    x: center.x,
                    y: center.y,
                    score: total,
                    vx: center.vx,
                    vy: center.vy,
                    splitAt: 0,
                    mergeAt: 0
                }];
            }
        }

        // Generar comida inicial
        for(let i=0; i<150; i++) {
            food.push({ 
                x: Math.random() * worldSize, 
                y: Math.random() * worldSize, 
                c: `hsl(${Math.random()*360}, 70%, 60%)` 
            });
        }

        function getImg(url) {
            if (!url) return null;
            if (avatarCache[url]) return avatarCache[url];
            const img = new Image();
            img.src = url;
            img.crossOrigin = "anonymous";
            avatarCache[url] = img;
            return img;
        }

        async function awardAgarProgress() {
            if (awardInFlight || myScore < nextAwardScore) return;
            awardInFlight = true;
            try {
                const points = Math.max(1, Math.min(10, Math.floor((myScore - nextAwardScore + 20) / 10)));
                const { data } = await supabaseClient.rpc('award_multiplayer_win', {
                    p_game_slug: 'agar',
                    p_room_code: room,
                    p_points: points
                });
                if (data?.awarded > 0) {
                    sessionAwarded += Number(data.awarded || 0);
                    window.parent.postMessage({ type: 'game:pointsAwarded', awarded: data.awarded, total: data.leaderboard_score }, '*');
                }
            } catch (e) {
                console.warn('No se pudieron guardar puntos de Agar', e);
            } finally {
                while (myScore >= nextAwardScore) nextAwardScore += 20;
                awardInFlight = false;
            }
        }

        function publishSessionScore() {
            const pointsDelta = Math.max(0, foodPointsPending - lastPublishedFoodPoints);
            lastPublishedFoodPoints = foodPointsPending;
            window.parent.postMessage({
                type: 'game:sessionScore',
                points: foodPointsPending,
                sessionPoints: sessionAwarded + foodPointsPending,
                pointsDelta
            }, '*');
            maybePublishLeaderboard(true);
        }

        // Sincronización Multijugador
        function hasUsableCells(player) {
            const remoteCells = Array.isArray(player?.cells) ? player.cells : [];
            return remoteCells.some(cell =>
                Number.isFinite(Number(cell.x)) &&
                Number.isFinite(Number(cell.y)) &&
                Number(cell.score || 0) > 0
            );
        }

        function mergeRemotePlayer(player, source) {
            const remoteKey = String(player?.playerId || player?.userId || '');
            if (!player || !remoteKey || remoteKey === playerId) return;
            const now = Date.now();
            const existing = players[remoteKey] || {};
            const incomingHasCells = hasUsableCells(player);
            const incomingX = Number(player.x);
            const incomingY = Number(player.y);
            const incomingScore = Number(player.score);

            players[remoteKey] = {
                ...existing,
                ...player,
                playerId: remoteKey,
                x: Number.isFinite(incomingX) ? incomingX : existing.x,
                y: Number.isFinite(incomingY) ? incomingY : existing.y,
                score: Number.isFinite(incomingScore) && incomingScore > 0 ? incomingScore : existing.score,
                cells: incomingHasCells ? player.cells : existing.cells,
                points: Number(player.points ?? player.sessionPoints ?? existing.points ?? 0),
                sessionPoints: Number(player.sessionPoints ?? player.points ?? existing.sessionPoints ?? 0),
                lastSeen: now,
                presenceSeen: source === 'presence' ? now : existing.presenceSeen
            };
            anchorSpawnNearRemote();
        }

        function rememberRemotePlayer(player) {
            const remoteKey = String(player?.playerId || player?.userId || '');
            if (!player || !remoteKey || remoteKey === playerId) return;
            const hasCells = hasUsableCells(player);
            if (!hasCells && (!Number.isFinite(Number(player.x)) || !Number.isFinite(Number(player.y)))) return;
            mergeRemotePlayer(player, 'broadcast');
        }

        function getRemoteCells(player) {
            const source = Array.isArray(player?.cells) && player.cells.length ? player.cells : [player];
            return source
                .map(cell => ({
                    ...cell,
                    x: Number(cell.x),
                    y: Number(cell.y),
                    score: Number(cell.score || player?.score || 0)
                }))
                .filter(cell => Number.isFinite(cell.x) && Number.isFinite(cell.y) && cell.score > 0);
        }

        function anchorSpawnNearRemote() {
            if (hasAnchoredSpawn || gameOver || myScore > 42 || cells.length !== 1) return;
            const remote = Object.values(players).find(player => player && (player.playerId || player.userId) !== playerId);
            if (!remote) return;
            const remoteCells = getRemoteCells(remote);
            const anchor = remoteCells[0] || remote;
            const anchorX = Number(anchor.x);
            const anchorY = Number(anchor.y);
            if (!Number.isFinite(anchorX) || !Number.isFinite(anchorY)) return;

            const angle = Math.random() * Math.PI * 2;
            const distance = 170 + Math.random() * 120;
            cells[0].x = Math.max(80, Math.min(worldSize - 80, anchorX + Math.cos(angle) * distance));
            cells[0].y = Math.max(80, Math.min(worldSize - 80, anchorY + Math.sin(angle) * distance));
            cells[0].vx = 0;
            cells[0].vy = 0;
            hasAnchoredSpawn = true;
            syncLocalStats();
            camera = { x: myPos.x, y: myPos.y, zoom: camera.zoom };
        }

        function pruneRemotePlayers() {
            const now = Date.now();
            Object.keys(players).forEach(id => {
                if (!players[id] || now - Number(players[id].lastSeen || 0) > REMOTE_PLAYER_TTL) {
                    delete players[id];
                }
            });
        }

        function publishLeaderboard() {
            pruneRemotePlayers();
            const leaderboardPlayers = { ...players, [userId]: getLocalPlayer() };
            const leaderboard = Object.values(leaderboardPlayers)
                .filter(Boolean)
                .sort((a, b) => Number(b.score || 0) - Number(a.score || 0))
                .slice(0, 10)
                .map(p => ({
                    userId: p.userId,
                    playerId: p.playerId || p.userId,
                    name: p.name,
                    avatarUrl: p.avatarUrl,
                    points: Math.floor(Number(p.points || p.sessionPoints || 0)),
                    sessionPoints: Math.floor(Number(p.sessionPoints || p.points || 0)),
                    score: Math.floor(Number(p.score || 0)),
                    cells: p.cells || []
                }));
            window.parent.postMessage({ type: 'game:updateLeaderboard', players: leaderboard }, '*');
        }

        function maybePublishLeaderboard(force = false) {
            const now = Date.now();
            if (!force && now - lastLeaderboardAt < 500) return;
            lastLeaderboardAt = now;
            publishLeaderboard();
        }

        function publishLocalRealtimeState(forcePresence = false) {
            const now = Date.now();
            const localState = getLocalPlayer();
            if (now - lastBroadcastAt > 160) {
                lastBroadcastAt = now;
                channel.send({ type: 'broadcast', event: 'state', payload: localState });
            }
            if (forcePresence || now - lastPresenceTrackAt > 800) {
                lastPresenceTrackAt = now;
                channel.track(localState);
            }
            maybePublishLeaderboard();
        }

        channel
            .on('broadcast', { event: 'state' }, ({ payload }) => {
                if (!payload || (payload.playerId || payload.userId) === playerId) return;
                rememberRemotePlayer(payload);
                maybePublishLeaderboard(true);
            })
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const activePresenceIds = new Set();
                Object.keys(state).forEach(key => {
                    const presence = state[key][0];
                    const presenceKey = String(presence?.playerId || presence?.userId || '');
                    if (presenceKey && presenceKey !== playerId) {
                        activePresenceIds.add(presenceKey);
                        mergeRemotePlayer(presence, 'presence');
                    }
                });
                const now = Date.now();
                Object.keys(players).forEach(id => {
                    if (!activePresenceIds.has(id) && now - Number(players[id].lastSeen || 0) > REMOTE_PLAYER_TTL) {
                        delete players[id];
                    }
                });
                anchorSpawnNearRemote();
                
                // 📡 ENVIAR LEADERBOARD AL MARCO DE FORBIDDENS
                const leaderboardPlayers = { ...players, [userId]: getLocalPlayer() };
                const leaderboard = Object.values(leaderboardPlayers)
                    .filter(Boolean)
                    .sort((a, b) => Number(b.score || 0) - Number(a.score || 0))
                    .slice(0, 10)
                    .map(p => ({
                        userId: p.userId,
                        playerId: p.playerId || p.userId,
                        name: p.name,
                        avatarUrl: p.avatarUrl,
                        points: Math.floor(Number(p.points || p.sessionPoints || 0)),
                        sessionPoints: Math.floor(Number(p.sessionPoints || p.points || 0)),
                        score: Math.floor(Number(p.score || 0)),
                        cells: p.cells || []
                    }));
                
                window.parent.postMessage({ type: 'game:updateLeaderboard', players: leaderboard }, '*');
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    lastPresenceTrackAt = Date.now();
                    await channel.track(getLocalPlayer());
                    publishLocalRealtimeState(true);
                }
            });

        // Loop de física
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const width = Math.max(1, Math.floor(rect.width || window.innerWidth));
            const height = Math.max(1, Math.floor(rect.height || window.innerHeight));
            const dpr = Math.max(1, window.devicePixelRatio || 1);
            const nextWidth = Math.floor(width * dpr);
            const nextHeight = Math.floor(height * dpr);
            if (canvas.width !== nextWidth || canvas.height !== nextHeight) {
                canvas.width = nextWidth;
                canvas.height = nextHeight;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            if (!mouse.x && !mouse.y) {
                mouse = { x: width / 2, y: height / 2 };
            }
        }

        function canvasWidth() {
            return canvas.clientWidth || window.innerWidth;
        }

        function canvasHeight() {
            return canvas.clientHeight || window.innerHeight;
        }

        function getTargetZoom() {
            const growth = Math.max(0, Math.sqrt(myScore) - Math.sqrt(40));
            return Math.max(0.36, Math.min(1, 1 - growth * 0.04));
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        setInterval(() => {
            if (gameOver) {
                publishLocalRealtimeState();
                return;
            }
            const centerX = canvasWidth() / 2;
            const centerY = canvasHeight() / 2;
            const dx = mouse.x - centerX;
            const dy = mouse.y - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            const moveX = dist > 10 ? dx / dist : 0;
            const moveY = dist > 10 ? dy / dist : 0;
            const throttle = dist > 10 ? Math.max(0.28, aimIntensity()) : 0;
            const now = Date.now();
            mergeCells(now);

            cells.forEach(cell => {
                const speed = Math.max(1.05, 3.1 - Math.sqrt(cell.score) * 0.16) * throttle;
                cell.vx = cell.vx * 0.84 + moveX * speed * 0.16;
                cell.vy = cell.vy * 0.84 + moveY * speed * 0.16;
                cell.x = Math.max(0, Math.min(worldSize, cell.x + cell.vx));
                cell.y = Math.max(0, Math.min(worldSize, cell.y + cell.vy));
            });

            for (let i = cells.length - 1; i >= 0; i--) {
                for (let j = i - 1; j >= 0; j--) {
                    const a = cells[i];
                    const b = cells[j];
                    const dxCells = a.x - b.x;
                    const dyCells = a.y - b.y;
                    const d = Math.max(1, Math.sqrt(dxCells * dxCells + dyCells * dyCells));
                    const minDistance = (a.score + b.score) * 0.62;
                    if (d < minDistance && (now < (a.mergeAt || 0) || now < (b.mergeAt || 0))) {
                        const push = (minDistance - d) * 0.015;
                        a.vx += (dxCells / d) * push;
                        a.vy += (dyCells / d) * push;
                        b.vx -= (dxCells / d) * push;
                        b.vy -= (dyCells / d) * push;
                    } else if (d < Math.max(a.score, b.score) * 0.5 && now >= (a.mergeAt || 0) && now >= (b.mergeAt || 0)) {
                        b.score += a.score;
                        cells.splice(i, 1);
                        break;
                    }
                }
            }
            
            // Colisión con comida
            food = food.filter(f => {
                for (const cell of cells) {
                    const d = Math.sqrt((f.x - cell.x)**2 + (f.y - cell.y)**2);
                    if (d < cell.score) {
                        cell.score += 0.5;
                        foodPointsPending += 1;
                        publishSessionScore();
                        return false;
                    }
                }
                return true;
            });
            while(food.length < 150) food.push({ x: Math.random() * worldSize, y: Math.random() * worldSize, c: `hsl(${Math.random()*360}, 70%, 60%)` });
            pruneRemotePlayers();

            // ⚔️ Colisión entre jugadores (Comer / Ser comido)
            Object.keys(players).forEach(id => {
                if (id === playerId) return;
                const p = players[id];
                if (!p || (p.playerId || p.userId) === playerId) return;
                const remoteCells = getRemoteCells(p);
                cells = cells.filter(cell => {
                    for (const remoteCell of remoteCells) {
                        const remoteScore = Number(remoteCell.score || p.score || 0);
                        const cellDistance = Math.sqrt((remoteCell.x - cell.x)**2 + (remoteCell.y - cell.y)**2);
                        if (cell.score > remoteScore * 1.1 && cellDistance < cell.score) {
                            cell.score += remoteScore * 0.35;
                            return true;
                        }
                        if (remoteScore > cell.score * 1.1 && cellDistance < remoteScore) {
                            return false;
                        }
                    }
                    return true;
                });
                if (!cells.length) showDeath();
            });
            syncLocalStats();
            // Actualizar mi posición a los demás
            publishLocalRealtimeState();
        }, 1000/60);

        function drawPlayer(p, camX, camY, zoom) {
            const x = p.x * zoom + camX;
            const y = p.y * zoom + camY;
            const r = Math.max(2, p.score * zoom);

            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.clip();

            const img = getImg(p.avatarUrl);
            if (img && img.complete) {
                ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
            } else {
                ctx.fillStyle = (p.playerId || p.userId) === playerId ? '#00f3ff' : '#222';
                ctx.fill();
            }
            ctx.restore();

            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.strokeStyle = (p.playerId || p.userId) === playerId ? '#00f3ff' : '#ff00ff';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function drawMinimap(width, height) {
            const mapSize = Math.min(150, Math.max(96, Math.min(width, height) * 0.23));
            const x = width - mapSize - 14;
            const y = 14;
            const scale = mapSize / worldSize;
            ctx.save();
            ctx.globalAlpha = 0.92;
            ctx.fillStyle = '#020617cc';
            ctx.strokeStyle = '#22d3ee99';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect?.(x, y, mapSize, mapSize, 10);
            if (!ctx.roundRect) ctx.rect(x, y, mapSize, mapSize);
            ctx.fill();
            ctx.stroke();

            const drawDot = (p, color) => {
                const dotX = x + Math.max(0, Math.min(worldSize, p.x)) * scale;
                const dotY = y + Math.max(0, Math.min(worldSize, p.y)) * scale;
                const r = Math.max(2, Math.min(9, Math.sqrt(Number(p.score || 10)) * 0.42));
                ctx.beginPath();
                ctx.arc(dotX, dotY, r, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#ffffffaa';
                ctx.lineWidth = 1;
                ctx.stroke();
            };

            Object.values(players).forEach(p => {
                if (!p || (p.playerId || p.userId) === playerId) return;
                const remoteCells = getRemoteCells(p);
                remoteCells.forEach(cell => drawDot(cell, '#ff00ff'));
            });
            cells.forEach(cell => drawDot(cell, '#00f3ff'));

            ctx.fillStyle = '#cbd5e1';
            ctx.font = '10px Inter, Arial';
            ctx.fillText('mapa', x + 8, y + mapSize - 8);
            ctx.restore();
        }

        function draw() {
            resizeCanvas();
            const width = canvasWidth();
            const height = canvasHeight();
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0,0,width, height);

            camera.x += (myPos.x - camera.x) * 0.12;
            camera.y += (myPos.y - camera.y) * 0.12;
            camera.zoom += (getTargetZoom() - camera.zoom) * 0.08;

            const zoom = camera.zoom;
            const camX = width / 2 - camera.x * zoom;
            const camY = height / 2 - camera.y * zoom;

            // 🏁 Dibujar cuadrícula de fondo neón
            ctx.strokeStyle = '#111';
            ctx.lineWidth = Math.max(1, zoom);
            const step = 100 * zoom;
            for (let x = (camX % step); x < width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for (let y = (camY % step); y < height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }
            ctx.strokeStyle = '#222';
            ctx.strokeRect(camX, camY, worldSize * zoom, worldSize * zoom); // Bordes del mundo

            // Dibujar comida
            food.forEach(f => {
                ctx.fillStyle = f.c;
                ctx.beginPath();
                ctx.arc(f.x * zoom + camX, f.y * zoom + camY, Math.max(2, 6 * zoom), 0, Math.PI*2);
                ctx.fill();
            });

            // Dibujar jugadores remotos desde Realtime y al jugador local desde la fisica actual.
            Object.values(players).forEach(p => {
                if (!p || (p.playerId || p.userId) === playerId) return;
                const remoteCells = getRemoteCells(p);
                remoteCells.forEach(cell => drawPlayer({ ...p, x: cell.x, y: cell.y, score: cell.score }, camX, camY, zoom));
            });
            cells.forEach(cell => drawPlayer({ ...getLocalPlayer(), x: cell.x, y: cell.y, score: cell.score }, camX, camY, zoom));
            drawMinimap(width, height);

            requestAnimationFrame(draw);
        }

        function updatePointer(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
            const y = Math.max(0, Math.min(rect.height, clientY - rect.top));
            mouse = {
                x,
                y
            };
            virtualAim = { x: x - rect.width / 2, y: y - rect.height / 2 };
        }

        function updateVirtualAim(dx, dy) {
            const maxDist = Math.max(90, Math.min(canvasWidth(), canvasHeight()) * 0.42);
            virtualAim.x += dx;
            virtualAim.y += dy;
            const dist = Math.sqrt(virtualAim.x * virtualAim.x + virtualAim.y * virtualAim.y);
            if (dist > maxDist) {
                virtualAim.x = virtualAim.x / dist * maxDist;
                virtualAim.y = virtualAim.y / dist * maxDist;
            }
            mouse = {
                x: canvasWidth() / 2 + virtualAim.x,
                y: canvasHeight() / 2 + virtualAim.y
            };
        }

        canvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            canvas.setPointerCapture?.(e.pointerId);
            updatePointer(e.clientX, e.clientY);
            if (e.pointerType === 'mouse') canvas.requestPointerLock?.();
        });
        canvas.addEventListener('pointermove', e => {
            e.preventDefault();
            if (document.pointerLockElement === canvas) return;
            updatePointer(e.clientX, e.clientY);
        });
        canvas.addEventListener('mousemove', e => {
            if (document.pointerLockElement !== canvas) updatePointer(e.clientX, e.clientY);
        });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === canvas) updateVirtualAim(e.movementX || 0, e.movementY || 0);
        });
        document.addEventListener('pointerlockchange', () => {
            canvas.classList.toggle('locked', document.pointerLockElement === canvas);
        });
        window.addEventListener('keydown', e => {
            if (e.code === 'Escape') {
                document.exitPointerLock?.();
                return;
            }
            if (e.code === 'KeyZ') {
                e.preventDefault();
                splitCells();
            }
        });
        splitButton.addEventListener('pointerdown', e => {
            e.preventDefault();
            splitCells();
        });
        resetPlayerButton.addEventListener('click', () => {
            resetLocalPlayer();
            channel.track(getLocalPlayer());
            publishLeaderboard();
        });
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            if (touch) updatePointer(touch.clientX, touch.clientY);
        }, { passive: false });
        draw();
    </script>
</body>
</html>
