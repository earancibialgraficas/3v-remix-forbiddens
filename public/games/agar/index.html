<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Forbiddens Agar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const params = new URLSearchParams(window.location.search);
        
        const room = params.get('room');
        const sbUrl = params.get('sbUrl');
        const sbKey = params.get('sbKey');
        const userId = params.get('userId');
        const userName = params.get('displayName') || 'Invitado';
        const avatarUrl = params.get('avatarUrl');

        // Configuración de Supabase Realtime
        const supabaseClient = supabase.createClient(sbUrl, sbKey);
        const channel = supabaseClient.channel(`agar_${room}`, {
            config: { presence: { key: userId } }
        });

        // Estado del Juego
        let worldSize = 3000;
        let myPos = { x: Math.random() * worldSize, y: Math.random() * worldSize };
        let myScore = 40;
        let players = {};
        let food = [];
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const avatarCache = {};

        // Generar comida inicial
        for(let i=0; i<150; i++) {
            food.push({ 
                x: Math.random() * worldSize, 
                y: Math.random() * worldSize, 
                c: `hsl(${Math.random()*360}, 70%, 60%)` 
            });
        }

        function getImg(url) {
            if (!url) return null;
            if (avatarCache[url]) return avatarCache[url];
            const img = new Image();
            img.src = url;
            img.crossOrigin = "anonymous";
            avatarCache[url] = img;
            return img;
        }

        // Sincronización Multijugador
        channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const newPlayers = {};
                Object.keys(state).forEach(key => {
                    newPlayers[key] = state[key][0];
                });
                players = newPlayers;
                
                // 📡 ENVIAR LEADERBOARD AL MARCO DE FORBIDDENS
                const leaderboard = Object.values(players)
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 10)
                    .map(p => ({
                        userId: p.userId,
                        name: p.name,
                        avatarUrl: p.avatarUrl,
                        score: Math.floor(p.score)
                    }));
                
                window.parent.postMessage({ type: 'game:updateLeaderboard', players: leaderboard }, '*');
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await channel.track({ userId, name: userName, avatarUrl, score: myScore, x: myPos.x, y: myPos.y });
                }
            });

        // Loop de física
        setInterval(() => {
            const dx = mouse.x - window.innerWidth / 2;
            const dy = mouse.y - window.innerHeight / 2;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 10) {
                const speed = Math.max(1, 6 - (myScore / 500)); // Más grande = más lento
                myPos.x = Math.max(0, Math.min(worldSize, myPos.x + (dx/dist) * speed));
                myPos.y = Math.max(0, Math.min(worldSize, myPos.y + (dy/dist) * speed));
            }
            
            // Colisión con comida
            food = food.filter(f => {
                const d = Math.sqrt((f.x - myPos.x)**2 + (f.y - myPos.y)**2);
                if (d < myScore) { myScore += 0.5; return false; }
                return true;
            });
            while(food.length < 150) food.push({ x: Math.random() * worldSize, y: Math.random() * worldSize, c: `hsl(${Math.random()*360}, 70%, 60%)` });

            // ⚔️ Colisión entre jugadores (Comer / Ser comido)
            Object.keys(players).forEach(id => {
                if (id === userId) return;
                const p = players[id];
                const d = Math.sqrt((p.x - myPos.x)**2 + (p.y - myPos.y)**2);
                
                // Si yo soy significativamente más grande y lo toco: crezco un poco
                if (myScore > p.score * 1.1 && d < myScore) {
                    myScore += p.score * 0.1; 
                }
                
                // Si el otro es significativamente más grande y me toca: muero y aparezco en otro lado
                if (p.score > myScore * 1.1 && d < p.score) {
                    myPos = { x: Math.random() * worldSize, y: Math.random() * worldSize };
                    myScore = 40;
                }
            });

            // Actualizar mi posición a los demás
            channel.track({ userId, name: userName, avatarUrl, score: myScore, x: myPos.x, y: myPos.y });
        }, 1000/60);

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0,0,canvas.width, canvas.height);

            const camX = window.innerWidth/2 - myPos.x;
            const camY = window.innerHeight/2 - myPos.y;

            // 🏁 Dibujar cuadrícula de fondo neón
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            const step = 100;
            for (let x = (camX % step); x < canvas.width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = (camY % step); y < canvas.height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            ctx.strokeStyle = '#222';
            ctx.strokeRect(camX, camY, worldSize, worldSize); // Bordes del mundo

            // Dibujar comida
            food.forEach(f => {
                ctx.fillStyle = f.c;
                ctx.beginPath();
                ctx.arc(f.x + camX, f.y + camY, 6, 0, Math.PI*2);
                ctx.fill();
            });

            // Dibujar jugadores
            Object.values(players).forEach(p => {
                const x = p.x + camX;
                const y = p.y + camY;
                const r = p.score;

                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI*2);
                ctx.clip();
                
                const img = getImg(p.avatarUrl);
                if (img && img.complete) {
                    ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
                } else {
                    ctx.fillStyle = '#222';
                    ctx.fill();
                }
                ctx.restore();

                ctx.strokeStyle = p.userId === userId ? '#00f3ff' : '#ff00ff';
                ctx.lineWidth = 4;
                ctx.stroke();
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', e => mouse = { x: e.clientX, y: e.clientY });
        draw();
    </script>
</body>
</html>
