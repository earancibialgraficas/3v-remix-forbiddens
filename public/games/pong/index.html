<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pong / Air Hockey</title>
  <style>
    :root{color-scheme:dark}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:#05050a;color:#f8fafc;font-family:Inter,Arial,sans-serif;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center}
    .hud{position:fixed;left:12px;right:12px;top:10px;display:flex;gap:8px;align-items:center;z-index:2}
    input,button{height:32px;border-radius:8px;border:1px solid #334155;background:#111827;color:#f8fafc;padding:0 10px;font:inherit;font-size:12px}
    button{cursor:pointer;background:#0e7490;border-color:#22d3ee;color:#001018;font-weight:700}
    #status{margin-left:auto;color:#67e8f9;font-size:12px}
    canvas{width:min(96vw,900px);height:min(70vh,540px);max-height:calc(100vh - 72px);background:radial-gradient(circle at center,#113329,#06110f);border:1px solid #1f766d;border-radius:10px;box-shadow:0 0 36px #000}
  </style>
</head>
<body>
  <div class="hud">
    <button id="create">Crear sala</button>
    <input id="room" maxlength="8" placeholder="Codigo" />
    <button id="join">Unirse</button>
    <span id="status">Conectando...</span>
  </div>
  <canvas id="c" width="900" height="540"></canvas>
  <script src="/games/realtime-room.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const presetRoom = (params.get('room') || '').toUpperCase();
    const shouldHost = params.get('host') === '1';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const roomInput = document.getElementById('room');
    if (presetRoom) roomInput.value = presetRoom;

    let roomId = presetRoom || null;
    let roomApi = null;
    let role = shouldHost ? 'left' : null;
    let connected = false;
    const paddles = { left: 230, right: 230 };
    const keys = {};
    const score = { left: 0, right: 0 };
    let ball = { x: 450, y: 270, vx: 4, vy: 2.8 };

    function setStatus(text){ statusEl.textContent = text; }
    function send(type, payload){ if (connected && roomApi) roomApi.send(type, payload); }
    function resetBall(dir){ ball = { x: 450, y: 270, vx: 4 * dir, vy: (Math.random() * 4) - 2 }; }

    async function setupRealtime(){
      try {
        roomApi = await window.createRealtimeRoom({
          game: 'pong',
          onPeers: count => setStatus(count > 1 ? 'Rival conectado' : 'Sala ' + roomId),
          onMessage: msg => {
            if (msg.type === 'paddle') paddles[msg.payload.side] = msg.payload.y;
            if (msg.type === 'state') {
              ball = msg.payload.ball;
              score.left = msg.payload.score.left;
              score.right = msg.payload.score.right;
            }
          }
        });
        setStatus('Listo');
        if (presetRoom && shouldHost) createRoom(presetRoom);
      } catch (e) {
        setStatus(e.message || 'Realtime no disponible');
      }
    }

    async function createRoom(room){
      roomId = room || Math.random().toString(36).slice(2,8).toUpperCase();
      role = 'left';
      await roomApi.connect(roomId);
      connected = true;
      roomInput.value = roomId;
      setStatus('Sala ' + roomId + ' - eres izquierda (W/S)');
    }
    async function joinRoom(room){
      roomId = room;
      role = 'right';
      await roomApi.connect(roomId);
      connected = true;
      setStatus('Conectado como derecha (flechas)');
    }
    document.getElementById('create').onclick = () => createRoom(roomInput.value.trim().toUpperCase());
    document.getElementById('join').onclick = () => joinRoom(roomInput.value.trim().toUpperCase());
    addEventListener('keydown', e => keys[e.key] = true);
    addEventListener('keyup', e => keys[e.key] = false);

    function update(){
      if (role === 'left') {
        if (keys.w || keys.W) paddles.left -= 7;
        if (keys.s || keys.S) paddles.left += 7;
        ball.x += ball.vx; ball.y += ball.vy;
        if (ball.y < 12 || ball.y > canvas.height - 12) ball.vy *= -1;
        if (ball.x < 34 && ball.y > paddles.left && ball.y < paddles.left + 86) ball.vx = Math.abs(ball.vx) + 0.15;
        if (ball.x > canvas.width - 34 && ball.y > paddles.right && ball.y < paddles.right + 86) ball.vx = -Math.abs(ball.vx) - 0.15;
        if (ball.x < -20) { score.right++; resetBall(1); }
        if (ball.x > canvas.width + 20) { score.left++; resetBall(-1); }
        send('state', { ball, score });
      }
      if (role === 'right') {
        if (keys.ArrowUp) paddles.right -= 7;
        if (keys.ArrowDown) paddles.right += 7;
      }
      paddles.left = Math.max(8, Math.min(canvas.height - 94, paddles.left));
      paddles.right = Math.max(8, Math.min(canvas.height - 94, paddles.right));
      if (role) send('paddle', { side: role, y: paddles[role] });
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle='#1f766d'; ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(450,0); ctx.lineTo(450,540); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle='#22c55e'; ctx.fillRect(18,paddles.left,14,86);
      ctx.fillStyle='#38bdf8'; ctx.fillRect(868,paddles.right,14,86);
      ctx.fillStyle='#f8fafc'; ctx.beginPath(); ctx.arc(ball.x,ball.y,10,0,Math.PI*2); ctx.fill();
      ctx.font='28px monospace'; ctx.fillStyle='#94a3b8'; ctx.fillText(score.left + '   ' + score.right, 410,42);
    }
    function loop(){ update(); draw(); requestAnimationFrame(loop); }
    setupRealtime();
    loop();
  </script>
</body>
</html>
