<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Card Duel</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:#07030f;color:#f8fafc;font-family:Inter,Arial,sans-serif;overflow:hidden}
    body{display:grid;grid-template-rows:auto minmax(0,1fr);gap:10px;padding:10px}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-width:0}
    input,button{min-height:32px;border-radius:8px;border:1px solid #334155;background:#111827;color:#f8fafc;padding:7px 10px;font:inherit;font-size:12px}
    button{cursor:pointer;background:#7c3aed;border-color:#c084fc;font-weight:700}
    button:disabled{opacity:.45;cursor:not-allowed}
    input{min-width:90px;flex:0 1 120px}
    #status{margin-left:auto;color:#c084fc;font-size:12px;white-space:nowrap}
    .table{width:min(960px,100%);height:100%;min-height:0;overflow:auto;justify-self:center;border:1px solid #4c1d95;border-radius:14px;background:radial-gradient(circle at center,#17310e,#12051f 70%);padding:16px;display:grid;grid-template-rows:auto minmax(70px,1fr) auto;gap:14px}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .hero{padding:12px;border:1px solid #334155;border-radius:12px;background:#020617cc;min-width:130px;text-align:center}
    .hp{font-size:28px;font-weight:900;color:#f87171}
    .log{align-self:center;text-align:center;color:#e9d5ff;min-height:80px}
    .hand{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .card{height:130px;border-radius:12px;border:1px solid #c084fc;background:linear-gradient(160deg,#581c87,#111827);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
    .atk{font-size:24px;font-weight:900;color:#facc15}
    @media(max-width:560px){#status{margin-left:0}.table{padding:12px;gap:10px}.hand{grid-template-columns:1fr}.card{height:96px}.row{align-items:stretch}.hero{min-width:104px}.hp{font-size:22px}}
    @media(max-width:430px){body{gap:8px;padding:8px}.controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.controls button,.controls input{width:100%;min-width:0}#status{grid-column:1/-1;text-align:center}.table{padding:10px}.hero{min-width:0}.row{gap:8px}.log{font-size:12px}.card{height:84px;font-size:12px}.atk{font-size:20px}}
    @media(max-height:520px){.table{padding:10px;gap:8px}.card{height:82px}.log{min-height:42px}.hero{padding:8px}.hp{font-size:20px}}
    @media(max-height:390px){body{gap:6px;padding:6px}.controls button,.controls input{min-height:28px;padding:5px 8px;font-size:11px}.table{gap:6px}.log{min-height:28px}.card{height:70px}.atk{font-size:18px}}
  </style>
</head>
<body>
  <div class="controls">
    <button id="create">Crear sala</button>
    <input id="room" maxlength="8" placeholder="Codigo" />
    <button id="join">Unirse</button>
    <button id="reset">Nueva mano</button>
    <span id="status">Conectando...</span>
  </div>
  <main class="table">
    <section class="row">
      <div class="hero"><div>Rival</div><div class="hp" id="oppHp">30</div></div>
      <div id="turn">Esperando sala</div>
    </section>
    <section class="log" id="log">Juega cartas de ataque. El primer jugador en bajar al rival a 0 gana.</section>
    <section>
      <div class="hero" style="margin-bottom:10px"><div>Tu HP</div><div class="hp" id="myHp">30</div></div>
      <div class="hand" id="hand"></div>
    </section>
  </main>
  <script src="/games/realtime-room.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const presetRoom = (params.get('room') || '').toUpperCase();
    const shouldHost = params.get('host') === '1';
    const profile = { userId: params.get('userId') || '', displayName: params.get('displayName') || 'Jugador', avatarUrl: params.get('avatarUrl') || '' };
    const roomInput = document.getElementById('room');
    const statusEl = document.getElementById('status');
    const handEl = document.getElementById('hand');
    const logEl = document.getElementById('log');
    const turnEl = document.getElementById('turn');
    if (presetRoom) roomInput.value = presetRoom;

    let connected = false, roomId = presetRoom || null, roomApi = null, role = shouldHost ? 'host' : null;
    let myHp = 30, oppHp = 30, myTurn = false, gameOver = false, winAwarded = false;
    let hand = [];
    function randCard(){ return { id: Math.random().toString(36).slice(2,7), atk: Math.floor(Math.random()*7)+2, cost: Math.floor(Math.random()*3)+1 }; }
    function drawHand(){ hand = [randCard(), randCard(), randCard()]; render(); }
    function setStatus(text){ statusEl.textContent = text; }
    function send(type,payload){ if (connected && roomApi) roomApi.send(type, payload); }
    function render(){
      document.getElementById('myHp').textContent = myHp;
      document.getElementById('oppHp').textContent = oppHp;
      turnEl.textContent = gameOver ? 'Partida terminada' : (myTurn ? 'Tu turno' : 'Turno rival');
      handEl.innerHTML = '';
      hand.forEach(card => {
        const btn = document.createElement('button');
        btn.className = 'card';
        btn.disabled = !myTurn || gameOver;
        btn.innerHTML = '<div>Golpe arcano</div><div class="atk">ATK ' + card.atk + '</div><div>Mana ' + card.cost + '</div>';
        btn.onclick = () => play(card.id);
        handEl.appendChild(btn);
      });
    }
    function endCheck(){
      if (myHp <= 0 || oppHp <= 0) {
        gameOver = true;
        logEl.textContent = oppHp <= 0 ? 'Ganaste el duelo.' : 'Perdiste el duelo.';
        if (oppHp <= 0 && !winAwarded) {
          winAwarded = true;
          roomApi?.awardWin('card-duel');
        }
      }
    }
    function play(id){
      const card = hand.find(c => c.id === id);
      if (!card || !myTurn || gameOver) return;
      oppHp = Math.max(0, oppHp - card.atk);
      hand = hand.filter(c => c.id !== id);
      while (hand.length < 3) hand.push(randCard());
      myTurn = false;
      logEl.textContent = 'Jugaste ATK ' + card.atk;
      send('card', { atk: card.atk });
      endCheck();
      render();
    }
    function reset(localOnly){
      myHp = 30; oppHp = 30; gameOver = false; winAwarded = false;
      myTurn = role === 'host';
      drawHand();
      logEl.textContent = 'Nueva mano lista.';
      if (!localOnly) send('reset', {});
    }

    async function setupRealtime(){
      try {
        roomApi = await window.createRealtimeRoom({
          game: 'card-duel',
          profile,
          onPeers: count => { if (count > 1) { myTurn = role === 'host'; setStatus('Rival conectado'); render(); } },
          onMessage: msg => {
            if (msg.type === 'card') {
              myHp = Math.max(0, myHp - msg.payload.atk);
              myTurn = true;
              logEl.textContent = 'El rival jugo ATK ' + msg.payload.atk;
              endCheck();
              render();
            }
            if (msg.type === 'reset') reset(true);
            if (msg.type === 'win') setStatus(msg.payload.displayName + ' gano +' + (msg.payload.awarded || 0) + ' pts');
          }
        });
        setStatus('Listo');
        drawHand();
        if (presetRoom) {
          if (shouldHost) createRoom(presetRoom);
          else joinRoom(presetRoom);
        }
      } catch (e) {
        setStatus(e.message || 'Realtime no disponible');
      }
    }
    async function createRoom(room){
      roomId = room || Math.random().toString(36).slice(2,8).toUpperCase();
      role = 'host';
      await roomApi.connect(roomId);
      connected = true;
      roomInput.value = roomId;
      setStatus('Sala ' + roomId);
      render();
    }
    async function joinRoom(room){
      roomId = room;
      role = 'guest';
      myTurn = false;
      await roomApi.connect(roomId);
      connected = true;
      setStatus('Sala ' + room);
      render();
    }
    document.getElementById('create').onclick = () => createRoom(roomInput.value.trim().toUpperCase());
    document.getElementById('join').onclick = () => joinRoom(roomInput.value.trim().toUpperCase());
    document.getElementById('reset').onclick = () => reset(false);
    setupRealtime();
  </script>
</body>
</html>
