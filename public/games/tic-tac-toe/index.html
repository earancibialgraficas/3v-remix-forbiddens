<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tic Tac Toe</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:#09090b;color:#f8fafc;font-family:Inter,Arial,sans-serif}
    body{display:flex;align-items:center;justify-content:center}
    .controls{position:fixed;top:12px;left:12px;right:12px;display:flex;gap:8px;align-items:center}
    input,button{height:32px;border-radius:8px;border:1px solid #334155;background:#111827;color:#f8fafc;padding:0 10px;font:inherit;font-size:12px}
    button{cursor:pointer;background:#0e7490;border-color:#22d3ee;color:#001018;font-weight:700}
    #status{margin-left:auto;color:#67e8f9;font-size:12px}
    .wrap{text-align:center;margin-top:48px}
    .board{display:grid;grid-template-columns:repeat(3,min(26vw,120px));gap:8px}
    .cell{width:min(26vw,120px);height:min(26vw,120px);border:1px solid #334155;border-radius:12px;background:#111827;color:#e879f9;display:flex;align-items:center;justify-content:center;font-size:min(16vw,64px);cursor:pointer}
    #info{min-height:22px;color:#cbd5e1}
  </style>
</head>
<body>
  <div class="controls">
    <button id="create">Crear sala</button>
    <input id="room" maxlength="8" placeholder="Codigo" />
    <button id="join">Unirse</button>
    <button id="reset">Reiniciar</button>
    <span id="status">Conectando...</span>
  </div>
  <div class="wrap">
    <div class="board" id="board"></div>
    <p id="info">Crea una sala o unite con codigo.</p>
  </div>
  <script src="/games/realtime-room.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const presetRoom = (params.get('room') || '').toUpperCase();
    const shouldHost = params.get('host') === '1';
    const boardEl = document.getElementById('board');
    const roomInput = document.getElementById('room');
    const statusEl = document.getElementById('status');
    const info = document.getElementById('info');
    if (presetRoom) roomInput.value = presetRoom;

    let connected = false, roomId = presetRoom || null, roomApi = null, mark = shouldHost ? 'X' : null, turn = 'X', winner = null;
    let board = Array(9).fill('');
    function setStatus(text){ statusEl.textContent = text; }
    function send(type,payload){ if (connected && roomApi) roomApi.send(type, payload); }
    function lineWinner(){
      const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for (const [a,b,c] of lines) if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
      return board.every(Boolean) ? 'Empate' : null;
    }
    function render(){
      boardEl.innerHTML = '';
      board.forEach((value,index) => {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.textContent = value;
        cell.onclick = () => play(index);
        boardEl.appendChild(cell);
      });
      winner = lineWinner();
      info.textContent = winner ? (winner === 'Empate' ? 'Empate' : winner + ' gana') : ('Turno ' + turn + (mark ? ' - eres ' + mark : ''));
    }
    function applyMove(index, playedMark){
      if (board[index] || winner) return;
      board[index] = playedMark;
      turn = playedMark === 'X' ? 'O' : 'X';
      render();
    }
    function play(index){
      if (!roomId || !mark || turn !== mark || board[index] || winner) return;
      applyMove(index, mark);
      send('move', { index, mark });
    }
    function reset(localOnly){
      board = Array(9).fill('');
      turn = 'X';
      winner = null;
      render();
      if (!localOnly) send('reset', {});
    }

    async function setupRealtime(){
      try {
        roomApi = await window.createRealtimeRoom({
          game: 'tic-tac-toe',
          onPeers: count => setStatus(count > 1 ? 'Rival conectado' : 'Sala ' + roomId),
          onMessage: msg => {
            if (msg.type === 'move') applyMove(msg.payload.index, msg.payload.mark);
            if (msg.type === 'reset') reset(true);
          }
        });
        setStatus('Listo');
        if (presetRoom && shouldHost) createRoom(presetRoom);
      } catch (e) {
        setStatus(e.message || 'Realtime no disponible');
      }
    }
    async function createRoom(room){
      roomId = room || Math.random().toString(36).slice(2,8).toUpperCase();
      mark = 'X';
      await roomApi.connect(roomId);
      connected = true;
      roomInput.value = roomId;
      setStatus('Sala ' + roomId);
      render();
    }
    async function joinRoom(room){
      roomId = room;
      mark = 'O';
      await roomApi.connect(roomId);
      connected = true;
      setStatus('Sala ' + room);
      render();
    }
    document.getElementById('create').onclick = () => createRoom(roomInput.value.trim().toUpperCase());
    document.getElementById('join').onclick = () => joinRoom(roomInput.value.trim().toUpperCase());
    document.getElementById('reset').onclick = () => reset(false);
    setupRealtime();
    render();
  </script>
</body>
</html>
